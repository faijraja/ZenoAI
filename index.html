<h1>My AI Tool 🤖</h1>

<input type="text" id="userInput" placeholder="Yahan question likho">
<button onclick="askAI()">Send</button>

<p id="response"></p>

<script>
async function askAI() {
  let input = document.getElementById("userInput").value;

  document.getElementById("response").innerText = "Loading...";

  let res = await fetch("https://api.openai.com/v1/chat/completions", {
    method: "POST",
    headers: {
      "Content-Type": "application/json",
      "Authorization": "Bearer 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
    },
    body: JSON.stringify({
      model: "gpt-4o-mini",
      messages: [{ role: "user", content: input }]
    })
  });

  let data = await res.json();
  document.getElementById("response").innerText =
    data.choices[0].message.content;
}
</script>
